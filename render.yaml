services:
  - type: web
    name: quotahire-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn quotahire.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "quotahire-backend.onrender.com,quotahire.org,app.quotahire.org,localhost"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://quotahire.org"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://quotahire.org,http://quotahire.org,https://app.quotahire.org,https://oziegbedavid048-a11y.github.io,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://quotahire-backend.onrender.com,https://quotahire.org,https://app.quotahire.org"
      - key: EMAIL_HOST
        value: "smtp.sender.net"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "Quotahire Backend_dRl0LE"
      # EMAIL_HOST_PASSWORD must be set in Render Dashboard (secret)
      - key: DEFAULT_FROM_EMAIL
        value: "Quota Hire <support@quotahire.org>"
      # CELERY_TASK_ALWAYS_EAGER: runs Celery tasks synchronously in the web process.
      # This ensures emails are sent immediately without a separate Celery worker service.
      # Remove this if you add a dedicated Celery worker service on a paid plan.
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      # ── Paystack Payment Gateway ──────────────────────────────────────────
      # IMPORTANT: Set these in the Render Dashboard → Environment → Secret Files
      # PAYSTACK_SECRET_KEY and PAYSTACK_PUBLIC_KEY must be added manually
      - key: CV_DOWNLOAD_FEE_EUR
        value: "1.50"
      - key: NGN_PER_EUR
        value: "1650"
      # DATABASE_URL must be set manually in Render Dashboard (contains secret credentials)
      # COURIER_AUTH_TOKEN must be set manually in Render Dashboard
      # PAYSTACK_SECRET_KEY must be set manually in Render Dashboard
      # PAYSTACK_PUBLIC_KEY must be set manually in Render Dashboard
      # CLOUDINARY_URL must be set manually in Render Dashboard (if using file uploads)

  - type: web
    name: quotahire-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://quotahire-backend.onrender.com/api"
      - key: VITE_PAYSTACK_PUBLIC_KEY
        value: "pk_live_beef698343ec5dbd2937927772c726f907e0db9e"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
