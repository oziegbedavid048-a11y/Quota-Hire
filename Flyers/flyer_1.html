<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #15750a;
    position: relative;
  }

  /* Background gradient & radial glows */
  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 80% 20%, #72dd1540 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 10% 80%, #0e4f0640 0%, transparent 60%),
                linear-gradient(145deg, #116108 0%, #15750a 40%, #0e4f06 100%);
  }

  /* Decorative orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.35;
  }
  .orb-1 { width: 320px; height: 320px; background: #72dd15; top: -60px; right: -60px; }
  .orb-2 { width: 240px; height: 240px; background: #72dd15; bottom: 80px; left: -80px; }
  .orb-3 { width: 180px; height: 180px; background: #0b3d05; top: 200px; left: -40px; }

  /* Grid pattern overlay */
  .grid-overlay {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 48px 52px 40px;
  }

  /* TOP ROW */
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
  }
  .logo-area {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-img {
    width: 52px; height: 52px; object-fit: contain;
    background: white; border-radius: 14px; padding: 5px;
  }
  .brand-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 26px; font-weight: 800;
    color: white; letter-spacing: -0.5px;
  }
  .website-pill {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 10px 22px;
    color: white; font-size: 18px; font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* HEADLINE */
  .headline-block {
    text-align: center;
    margin-bottom: 32px;
  }
  .headline-top {
    font-family: 'Inter Tight', sans-serif;
    font-size: 64px; font-weight: 800;
    color: white; line-height: 1;
    margin-bottom: 4px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .headline-main {
    font-family: 'Inter Tight', sans-serif;
    font-size: 108px; font-weight: 900;
    color: white; line-height: 0.9;
    letter-spacing: -4px;
    text-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .headline-sub {
    margin-top: 14px;
    font-size: 22px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  /* MOCKUP AREA */
  .mockup-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 16px;
  }

  /* Three-panel browser mockups */
  .mockup-panel {
    position: absolute;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
  }

  .mockup-browser-bar {
    height: 28px;
    background: #f1f5f9;
    display: flex; align-items: center;
    padding: 0 10px; gap: 5px;
    border-bottom: 1px solid #e2e8f0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: #ef4444; }
  .dot-y { background: #f59e0b; }
  .dot-g { background: #22c55e; }
  .url-bar {
    flex: 1; background: white; border-radius: 4px;
    height: 16px; margin-left: 8px;
    display: flex; align-items: center; padding: 0 6px;
    font-size: 8px; color: #64748b; overflow: hidden;
    white-space: nowrap;
  }

  .panel-left {
    width: 340px; height: 240px;
    transform: perspective(1200px) rotateY(28deg) rotateX(3deg);
    left: -10px; bottom: 0;
    z-index: 1;
    opacity: 0.85;
  }
  .panel-center {
    width: 460px; height: 300px;
    z-index: 3;
    transform: translateY(-10px);
  }
  .panel-right {
    width: 300px; height: 210px;
    transform: perspective(1200px) rotateY(-28deg) rotateX(3deg);
    right: -10px; bottom: 0;
    z-index: 1;
    opacity: 0.85;
  }

  .mockup-img {
    width: 100%; height: calc(100% - 28px);
    object-fit: cover; object-position: top;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 18px 36px;
    display: flex; align-items: center; justify-content: center;
    gap: 32px;
  }
  .bottom-item {
    display: flex; align-items: center; gap: 10px;
    color: white; font-size: 18px; font-weight: 600;
  }
  .bottom-icon { font-size: 20px; }
  .divider { color: rgba(255,255,255,0.3); font-size: 20px; }

  /* Social icons */
  .social-icons {
    display: flex; gap: 12px; align-items: center;
  }
  .social-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<div class="content">

  <!-- TOP ROW -->
  <div class="top-row">
    <div class="logo-area">
      <img src="logo.png" class="logo-img" alt="Quota Hire Logo">
      <span class="brand-name">Quota Hire</span>
    </div>
    <div class="website-pill">quotahire.org</div>
  </div>

  <!-- HEADLINE -->
  <div class="headline-block">
    <div class="headline-top">We've Officially</div>
    <div class="headline-main">LAUNCHED</div>
    <div class="headline-sub">Today — check out our platform now</div>
  </div>

  <!-- MOCKUP PANELS -->
  <div class="mockup-area">
    <div class="mockup-panel panel-left">
      <div class="mockup-browser-bar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <div class="url-bar">quotahire.org/dashboard</div>
      </div>
      <img src="employee_dashboard.png" class="mockup-img" alt="Employee Dashboard">
    </div>
    <div class="mockup-panel panel-center">
      <div class="mockup-browser-bar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <div class="url-bar">quotahire.org/dashboard</div>
      </div>
      <img src="company_dashboard.png" class="mockup-img" alt="Company Dashboard">
    </div>
    <div class="mockup-panel panel-right">
      <div class="mockup-browser-bar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <div class="url-bar">quotahire.org</div>
      </div>
      <img src="employee_dashboard.png" class="mockup-img" alt="Dashboard">
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="bottom-item">
      <span class="bottom-icon">✉</span>
      <span>support.quotahire@gmail.com</span>
    </div>
    <span class="divider">|</span>
    <div class="social-icons">
      <div class="social-icon">f</div>
      <div class="social-icon">𝕏</div>
      <div class="social-icon">in</div>
    </div>
    <span class="divider">|</span>
    <div class="bottom-item">
      <span>quotahire.org</span>
    </div>
  </div>

</div>
</body>
</html>
