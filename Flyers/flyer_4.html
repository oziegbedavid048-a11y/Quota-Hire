<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #fafaf9;
    position: relative;
  }

  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    padding: 60px 70px;
  }

  /* TOP */
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 50px;
  }
  .logo-area {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-img {
    width: 52px; height: 52px; object-fit: contain;
  }
  .brand-stack { }
  .brand-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 22px; font-weight: 800; color: #0f172a;
  }
  .brand-sub { font-size: 12px; color: #64748b; font-weight: 500; }

  /* Headline - DigitalCreativeMinds style */
  .headline-row {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 10px;
  }
  .hl-small {
    font-family: 'Inter Tight', sans-serif;
    font-size: 52px; font-weight: 700;
    color: #0f172a;
  }
  .hl-line {
    flex: 1; height: 3px;
    background: linear-gradient(90deg, #15750a, transparent);
    border-radius: 2px;
  }
  .hl-website {
    font-family: 'Inter Tight', sans-serif;
    font-size: 52px; font-weight: 900;
    margin-bottom: 0;
  }
  .hl-website .green { color: #15750a; }
  .hl-website .black { color: #0f172a; }
  .hl-launch {
    font-family: 'Inter Tight', sans-serif;
    font-size: 38px; font-weight: 700; color: #0f172a;
    margin-bottom: 44px;
  }

  /* Devices - clean light look */
  .devices-row {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 32px; margin-bottom: 48px;
  }

  /* Laptop */
  .laptop-shell {
    background: #e2e8f0;
    border-radius: 18px 18px 0 0;
    padding: 10px 10px 0;
    width: 560px;
    box-shadow: 0 24px 60px rgba(15,23,42,0.15);
  }
  .laptop-screen-wrap {
    background: #0f172a;
    border-radius: 10px; overflow: hidden;
    padding: 3px 3px 0;
  }
  .laptop-screen-wrap img { width: 100%; display: block; border-radius: 8px; }
  .laptop-chin {
    background: #cbd5e1; height: 18px;
    border-radius: 0 0 4px 4px;
  }
  .laptop-base {
    background: #94a3b8; height: 8px; border-radius: 0 0 16px 16px;
    margin: 0 20px;
  }

  /* Phone (floating beside laptop) */
  .phone-shell {
    width: 140px; height: 270px;
    background: #0f172a;
    border-radius: 34px; padding: 12px 8px;
    box-shadow: 0 24px 60px rgba(15,23,42,0.25);
    position: relative; bottom: 20px;
  }
  .phone-notch {
    width: 50px; height: 10px;
    background: #1e293b; border-radius: 20px;
    margin: 0 auto 8px;
  }
  .phone-scr {
    border-radius: 24px; overflow: hidden;
    height: calc(100% - 18px);
  }
  .phone-scr img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  /* Bottom text */
  .bottom-text {
    text-align: center;
    padding: 18px 0;
    border-top: 1.5px solid #e2e8f0;
  }
  .bt-main {
    font-size: 18px; color: #475569; font-weight: 500;
    margin-bottom: 8px;
  }
  .bt-url {
    display: inline-block;
    border: 2px solid #15750a; color: #15750a;
    border-radius: 50px; padding: 10px 36px;
    font-size: 20px; font-weight: 700; letter-spacing: 0.3px;
  }

  /* Green accent bar */
  .accent-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 8px;
    background: linear-gradient(180deg, #72dd15, #15750a);
  }
</style>
</head>
<body>
<div class="accent-bar"></div>

<div class="content">

  <div class="top-row">
    <div class="logo-area">
      <img src="logo.png" class="logo-img" alt="Logo">
      <div class="brand-stack">
        <div class="brand-name">Quota Hire</div>
        <div class="brand-sub">Sales Talent Recruiting Platform</div>
      </div>
    </div>
  </div>

  <div class="headline-row">
    <div class="hl-small">Our New</div>
    <div class="hl-line"></div>
  </div>
  <div class="hl-website">
    <span class="green">Platform</span><span class="black"> Launch</span>
  </div>
  <div style="height:6px;"></div>
  <div class="hl-launch">Connecting Sales Talent with Top Companies</div>

  <div class="devices-row">
    <!-- Laptop -->
    <div>
      <div class="laptop-shell">
        <div class="laptop-screen-wrap">
          <img src="company_dashboard.png" alt="Company Dashboard">
        </div>
      </div>
      <div class="laptop-chin"></div>
      <div class="laptop-base"></div>
    </div>

    <!-- Phone -->
    <div class="phone-shell">
      <div class="phone-notch"></div>
      <div class="phone-scr">
        <img src="employee_dashboard.png" alt="Employee Mobile">
      </div>
    </div>
  </div>

  <div class="bottom-text">
    <div class="bt-main">Discover how we can help connect you with your next opportunity.</div>
    <div class="bt-url">www.quotahire.org</div>
  </div>

</div>
</body>
</html>
