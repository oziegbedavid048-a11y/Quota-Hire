<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  body {
    width: 1080px; height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #f4fbf2;
    position: relative;
  }

  /* White background with green accents - like SwiftServe flyer */
  .bg-swirl {
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='1080' height='1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='200' cy='900' rx='400' ry='350' fill='%2315750a' opacity='0.08'/%3E%3Cellipse cx='950' cy='150' rx='300' ry='280' fill='%2372dd15' opacity='0.1'/%3E%3Cellipse cx='1000' cy='750' rx='200' ry='180' fill='%2315750a' opacity='0.06'/%3E%3C/svg%3E");
  }

  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    padding: 52px 56px 44px;
  }

  /* Top */
  .top {
    text-align: center; margin-bottom: 40px;
  }
  .logo-area {
    display: inline-flex; align-items: center; gap: 14px;
    margin-bottom: 6px;
  }
  .logo-img {
    width: 56px; height: 56px; object-fit: contain;
  }
  .brand-name {
    font-family: 'Inter Tight', sans-serif;
    font-size: 28px; font-weight: 800;
    color: #0e4f06; letter-spacing: -0.5px;
  }
  .tagline {
    font-size: 15px; color: #64748b; font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* Main headline */
  .headline {
    text-align: center; margin-bottom: 44px;
  }
  .hl-line1 {
    font-family: 'Inter Tight', sans-serif;
    font-size: 62px; font-weight: 800;
    color: #0f172a; line-height: 1;
    margin-bottom: 0;
  }
  .hl-live {
    font-family: 'Inter Tight', sans-serif;
    font-size: 130px; font-weight: 900;
    color: #15750a; line-height: 0.85;
    letter-spacing: -6px;
    display: block;
  }
  .hl-url {
    display: inline-block;
    background: #15750a; color: white;
    font-size: 26px; font-weight: 700;
    padding: 10px 32px; border-radius: 50px;
    margin-top: 18px;
    letter-spacing: 0.5px;
  }

  /* Device mockups row */
  .devices {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 24px; margin-bottom: 36px;
  }

  /* Laptop mockup */
  .laptop-wrap {
    position: relative; width: 560px; flex-shrink: 0;
  }
  .laptop-body {
    background: #1e293b;
    border-radius: 14px 14px 0 0;
    padding: 8px 8px 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .laptop-screen {
    border-radius: 8px; overflow: hidden;
    border: 2px solid #334155;
  }
  .laptop-screen img { width: 100%; display: block; }
  .laptop-base {
    background: #334155; height: 14px; border-radius: 0 0 6px 6px;
    margin-top: -1px;
  }
  .laptop-foot {
    background: #475569; height: 6px; border-radius: 0 0 20px 20px;
    margin: 0 30px;
  }

  /* Phone mockup */
  .phone-wrap { flex-shrink: 0; }
  .phone-body {
    width: 130px; height: 240px;
    background: #1e293b;
    border-radius: 28px;
    padding: 10px 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    border: 2px solid #334155;
  }
  .phone-notch {
    width: 40px; height: 8px;
    background: #1e293b; border-radius: 4px;
    margin: 0 auto 6px;
  }
  .phone-screen {
    border-radius: 16px; overflow: hidden;
    height: calc(100% - 14px);
  }
  .phone-screen img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  /* Tablet mockup */
  .tablet-wrap { flex-shrink: 0; }
  .tablet-body {
    width: 190px; height: 260px;
    background: #1e293b;
    border-radius: 20px;
    padding: 12px 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    border: 2px solid #334155;
  }
  .tablet-screen {
    border-radius: 10px; overflow: hidden;
    height: 100%;
  }
  .tablet-screen img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  /* Bottom */
  .bottom {
    text-align: center;
    color: #475569; font-size: 17px; font-weight: 500;
    padding-top: 10px;
    border-top: 1px solid #e2e8f0;
  }
  .bottom strong { color: #15750a; }

  /* Confetti decorations */
  .confetti {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 3px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="bg-swirl"></div>

<!-- Confetti decorations -->
<div class="confetti" style="background:#72dd15; top:80px; left:120px; transform:rotate(25deg);"></div>
<div class="confetti" style="background:#15750a; top:150px; left:80px; transform:rotate(-15deg);"></div>
<div class="confetti" style="background:#f59e0b; top:60px; right:200px; transform:rotate(40deg);"></div>
<div class="confetti" style="background:#72dd15; top:200px; right:100px; transform:rotate(-30deg); width:12px; height:20px; border-radius:50%;"></div>
<div class="confetti" style="background:#f59e0b; bottom:250px; left:60px; transform:rotate(20deg); border-radius:50%;"></div>
<div class="confetti" style="background:#15750a; bottom:320px; right:80px; transform:rotate(-45deg);"></div>
<div class="confetti" style="background:#72dd15; top:300px; left:40px; transform:rotate(60deg); width:10px; height:22px;"></div>
<div class="confetti" style="background:#f59e0b; top:120px; right:350px; transform:rotate(-20deg); width:8px; height:18px;"></div>

<div class="content">

  <div class="top">
    <div class="logo-area">
      <img src="logo.png" class="logo-img" alt="Quota Hire Logo">
      <span class="brand-name">Quota Hire</span>
    </div>
    <div class="tagline">The #1 Sales Talent Recruiting Platform</div>
  </div>

  <div class="headline">
    <div class="hl-line1">Our WEBSITE is</div>
    <span class="hl-live">LIVE</span>
    <div><span class="hl-url">quotahire.org</span></div>
  </div>

  <div class="devices">
    <!-- Laptop -->
    <div class="laptop-wrap">
      <div class="laptop-body">
        <div class="laptop-screen">
          <img src="company_dashboard.png" alt="Company Dashboard">
        </div>
      </div>
      <div class="laptop-base"></div>
      <div class="laptop-foot"></div>
    </div>

    <!-- Phone -->
    <div class="phone-wrap">
      <div class="phone-body">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <img src="employee_dashboard.png" alt="Mobile Dashboard">
        </div>
      </div>
    </div>

    <!-- Tablet -->
    <div class="tablet-wrap">
      <div class="tablet-body">
        <div class="tablet-screen">
          <img src="company_dashboard.png" alt="Tablet Dashboard">
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    Discover how we connect <strong>top sales talent</strong> with <strong>the best companies</strong> — visit <strong>quotahire.org</strong>
  </div>

</div>
</body>
</html>
